fragment TransactionProcessSessionPayload on TransactionProcessSession {
  issuedAt
  version
  merchantReference
  customerIpAddress
  data
  action {
    amount
    currency
    actionType
  }
  transaction {
    id
    token
    pspReference
    externalUrl
  }
  sourceObject {
    __typename
    ... on Checkout {
      id
      email
      user {
        id
      }
      channel {
        slug
      }
      shippingAddress {
        country {
          code
          country
        }
      }
      billingAddress {
        country {
          code
          country
        }
      }
      metadata {
        key
        value
      }
      privateMetadata {
        key
        value
      }
    }
    ... on Order {
      id
      checkoutId
      userEmail
      user {
        id
      }
      channel {
        slug
      }
      shippingAddress {
        country {
          code
          country
        }
      }
      billingAddress {
        country {
          code
          country
        }
      }
      metadata {
        key
        value
      }
      privateMetadata {
        key
        value
      }
    }
  }
}
